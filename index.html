<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momon-ga Combined Viewer</title>
    <style>
        /* 検索画面のスタイル */
        body { font-family: sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #ff4757; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #ff6b81; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.2s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-info { padding: 10px; font-size: 0.9em; }
        .card-title { font-weight: bold; height: 3em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 5px; }
        .status { text-align: center; margin: 20px; color: #666; }

        /* ビューア用の追加スタイル */
        #viewerOverlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; color: white; padding-top: 50px;
        }
        .viewer-content { max-width: 900px; margin: 0 auto; text-align: center; }
        .close-btn { position: fixed; top: 20px; right: 30px; font-size: 40px; cursor: pointer; z-index: 1001; }
        .viewer-image-list img { max-width: 100%; margin-bottom: 15px; border: 1px solid #333; }
        #viewerTitle { border-bottom: 2px solid #ff4757; margin-bottom: 20px; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Momon-ga 検索ボード</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="キーワードを入力 (例: A, タイツ...)" value="A">
        <button onclick="search()">検索</button>
    </div>

    <div id="status" class="status"></div>
    <div class="grid" id="resultGrid"></div>
</div>

<div id="viewerOverlay">
    <span class="close-btn" onclick="closeViewer()">&times;</span>
    <div class="viewer-content">
        <h2 id="viewerTitle"></h2>
        <div id="viewerStatus" class="status" style="color: #eee;"></div>
        <div id="viewerImageList" class="viewer-image-list"></div>
    </div>
</div>

<script>
    const API_URL = 'https://muhoweb-teoj.onrender.com/api/v3/djsearch';
    // Renderにデプロイした後は、自分のドメインURLに変更してください
    const MY_PROXY_SERVER = window.location.hostname === 'localhost' 
        ? 'http://localhost:3000/api/proxy-base64' 
        : '/api/proxy-base64';

    // 検索機能
    async function search() {
        const query = document.getElementById('searchInput').value;
        const grid = document.getElementById('resultGrid');
        const status = document.getElementById('status');

        if (!query) return;

        grid.innerHTML = '';
        status.innerText = '読み込み中...';

        try {
            const response = await fetch(`${API_URL}?q=${encodeURIComponent(query)}&page=1`);
            const data = await response.json();

            status.innerText = '';

            if (data.result && data.result.length > 0) {
                data.result.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${item.image}" alt="${item.title}" loading="lazy">
                        <div class="card-info">
                            <div class="card-title">${item.title}</div>
                            <small style="color:#888">ID: ${item.id}</small>
                        </div>
                    `;
                    card.onclick = () => openViewer(item.id, item.rule);
                    grid.appendChild(card);
                });
            } else {
                status.innerText = '結果が見つかりませんでした。';
            }
        } catch (error) {
            console.error(error);
            status.innerText = 'エラーが発生しました。';
        }
    }

    // ビューア機能 (Base64データを一括取得して表示)
    async function openViewer(id, rule) {
        const overlay = document.getElementById('viewerOverlay');
        const viewerTitle = document.getElementById('viewerTitle');
        const viewerStatus = document.getElementById('viewerStatus');
        const viewerImageList = document.getElementById('viewerImageList');

        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
        viewerImageList.innerHTML = '';
        viewerTitle.innerText = '読み込み中...';
        viewerStatus.innerText = "サーバーで画像をBase64に変換しています。少々お待ちください...";

        const targetUrl = `https://momon-ga.com/fanzine/${id}`;
        const finalUrl = `${MY_PROXY_SERVER}?url=${encodeURIComponent(targetUrl)}`;

        try {
            const response = await fetch(finalUrl);
            const data = await response.json();

            viewerTitle.innerText = data.title;
            
            if (data.images && data.images.length > 0) {
                data.images.forEach(base64Data => {
                    const newImg = document.createElement('img');
                    newImg.src = base64Data;
                    viewerImageList.appendChild(newImg);
                });
                viewerStatus.innerText = `完了: ${data.images.length} 枚の画像を表示中`;
            } else {
                viewerStatus.innerText = "画像が見つかりませんでした。";
            }

        } catch (error) {
            console.error(error);
            viewerStatus.innerText = "エラー: データの取得または変換に失敗しました。";
        }
    }

    function closeViewer() {
        document.getElementById('viewerOverlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onload = search;
</script>

</body>
</html>
